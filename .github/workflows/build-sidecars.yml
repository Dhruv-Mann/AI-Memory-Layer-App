name: Build Sidecars

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Sidecar on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller -r sidecar/requirements.txt

    - name: Run build script
      run: |
        python sidecar/build.py

    - name: Upload Sidecar Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sidecar-${{ matrix.os }}
        path: sidecar/dist/
